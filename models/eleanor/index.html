<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse &mdash; Eleanor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0c0c0c;
            --card-bg: #141414;
            --border: #242424;
            --gold: #c9a455;
            --gold-light: #e8c978;
            --text: #ffffff;
            --muted: #777;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* ── NAV ─────────────────────────────────────── */
        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2rem;
            background: rgba(12,12,12,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(36,36,36,0.6);
        }

        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.68rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--gold); }

        .nav-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            padding-right: 0.4em;
            text-transform: uppercase;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-brand em {
            font-style: normal;
            color: var(--gold);
        }

        .nav-spacer { width: 120px; }

        /* ── HERO ─────────────────────────────────────── */
        .model-hero {
            position: relative;
            height: 92vh;
            min-height: 520px;
            overflow: hidden;
            margin-top: 0;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(12,12,12,0.35) 0%,
                rgba(12,12,12,0.1) 30%,
                rgba(12,12,12,0.3) 60%,
                rgba(12,12,12,0.92) 100%
            );
        }

        .hero-info {
            position: absolute;
            bottom: 3.5rem;
            left: 0;
            right: 0;
            text-align: center;
            padding: 0 2rem;
        }

        .hero-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(3rem, 10vw, 6.5rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            line-height: 1;
            color: #fff;
        }

        .hero-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 1.4rem auto;
        }

        .hero-price {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.45em;
            color: var(--gold);
            text-transform: uppercase;
        }

        /* ── GALLERY SECTION ─────────────────────────── */
        .gallery-section {
            padding: 5rem 2rem 6rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .gallery-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #fff;
        }

        .gallery-divider {
            width: 50px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 1rem auto 0;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        @media (max-width: 768px) {
            .photo-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .photo-grid { grid-template-columns: 1fr; }
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            border: 1px solid var(--border);
            aspect-ratio: 3/4;
            cursor: pointer;
            background: var(--card-bg);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .photo-item:hover {
            border-color: var(--gold);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
            transition: transform 0.45s ease;
        }

        .photo-item:hover img {
            transform: scale(1.06);
        }

        .photo-item-zoom {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0);
            transition: background 0.3s ease;
        }

        .photo-item:hover .photo-item-zoom {
            background: rgba(0,0,0,0.2);
        }

        .zoom-icon {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(201,164,85,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: scale(0.8);
        }

        .photo-item:hover .zoom-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* ── LIGHTBOX ────────────────────────────────── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            animation: lbFadeIn 0.2s ease;
        }

        .lightbox.active {
            display: flex;
        }

        @keyframes lbFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .lb-img-wrap {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lb-img {
            max-width: 90vw;
            max-height: 88vh;
            object-fit: contain;
            display: block;
            border-radius: 2px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }

        .lb-close {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 1rem;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
            z-index: 10000;
        }

        .lb-close:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .lb-nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            color: #fff;
            font-size: 1.6rem;
            width: 52px;
            height: 52px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            z-index: 10000;
        }

        .lb-nav-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,164,85,0.08);
        }

        .lb-prev { left: 1.5rem; }
        .lb-next { right: 1.5rem; }

        .lb-counter {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            text-transform: uppercase;
            z-index: 10000;
        }

        /* ── FOOTER ──────────────────────────────────── */
        .site-footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            color: #2e2e2e;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .site-nav { padding: 1rem 1.2rem; }
            .hero-info { bottom: 2rem; }
            .gallery-section { padding: 4rem 1.2rem 5rem; }
            .lb-prev { left: 0.8rem; }
            .lb-next { right: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="site-nav">
        <a href="../../unknowndayoth2/" class="back-link">&#8592;&nbsp; All Models</a>
        <div class="nav-brand">E<em>C</em>LIPSE</div>
        <div class="nav-spacer"></div>
    </nav>

    <!-- HERO -->
    <div class="model-hero">
        <img class="hero-img" src="../../images/eleanor/1.jpeg" alt="Eleanor">
        <div class="hero-overlay"></div>
        <div class="hero-info">
            <div class="hero-name">Eleanor</div>
            <div class="hero-divider"></div>
            <div class="hero-price">Starting at $3,000</div>
        </div>
    </div>

    <!-- GALLERY -->
    <section class="gallery-section">
        <div class="gallery-header">
            <h2 class="gallery-title">Gallery</h2>
            <div class="gallery-divider"></div>
        </div>
        <div class="photo-grid" id="photo-grid"></div>
    </section>

    <footer class="site-footer">&copy; 2026 Eclipse &mdash; Private Access Only</footer>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
        <button class="lb-close" id="lb-close">&#10005;</button>
        <button class="lb-nav-btn lb-prev" id="lb-prev">&#8249;</button>
        <div class="lb-img-wrap">
            <img id="lb-img" src="" alt="Eleanor">
        </div>
        <button class="lb-nav-btn lb-next" id="lb-next">&#8250;</button>
        <div class="lb-counter" id="lb-counter"></div>
    </div>

    <script>
        // Auth guard — redirect to gallery if not authenticated
        if (sessionStorage.getItem('eclipse_auth') !== 'true') {
            window.location.replace('../../unknowndayoth2/');
        }

        const photos = ["../../images/eleanor/1.jpeg", "../../images/eleanor/2.jpeg", "../../images/eleanor/3.jpeg", "../../images/eleanor/4.jpeg", "../../images/eleanor/5.jpeg", "../../images/eleanor/6.jpeg", "../../images/eleanor/7.jpeg", "../../images/eleanor/8.jpeg"];
        let current = 0;

        // Build photo grid
        const grid = document.getElementById('photo-grid');
        photos.forEach(function(src, i) {
            const item = document.createElement('div');
            item.className = 'photo-item';

            const img = document.createElement('img');
            img.src = src;
            img.alt = 'Eleanor photo ' + (i + 1);
            img.loading = 'lazy';

            const overlay = document.createElement('div');
            overlay.className = 'photo-item-zoom';
            overlay.innerHTML = '<div class="zoom-icon">&#43;</div>';

            item.appendChild(img);
            item.appendChild(overlay);
            item.addEventListener('click', function() { openLb(i); });
            grid.appendChild(item);
        });

        // Lightbox
        const lb      = document.getElementById('lightbox');
        const lbImg   = document.getElementById('lb-img');
        const lbCnt   = document.getElementById('lb-counter');

        function setPhoto(i) {
            current = (i + photos.length) % photos.length;
            lbImg.src = photos[current];
            lbCnt.textContent = (current + 1) + ' \u2014 ' + photos.length;
        }

        function openLb(i) {
            setPhoto(i);
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLb() {
            lb.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lb-close').addEventListener('click', closeLb);
        document.getElementById('lb-prev').addEventListener('click', function() { setPhoto(current - 1); });
        document.getElementById('lb-next').addEventListener('click', function() { setPhoto(current + 1); });

        lb.addEventListener('click', function(e) {
            if (e.target === lb || e.target.className === 'lb-img-wrap') closeLb();
        });

        document.addEventListener('keydown', function(e) {
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape')      closeLb();
            if (e.key === 'ArrowLeft')   setPhoto(current - 1);
            if (e.key === 'ArrowRight')  setPhoto(current + 1);
        });
    </script>
</body>
</html>
