<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0c0c0c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #1c1008 0%, #0c0c0c 65%);
            z-index: 0;
        }

        /* subtle grain texture */
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(3.5rem, 14vw, 9rem);
            font-weight: 300;
            letter-spacing: 0.55em;
            color: #ffffff;
            text-transform: uppercase;
            line-height: 1;
            padding-right: 0.55em; /* offset the trailing letter-spacing */
        }

        .brand em {
            font-style: normal;
            color: #c9a455;
        }

        .divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, transparent, #c9a455, transparent);
            margin: 2.2rem auto;
        }

        .lock {
            font-size: 1.8rem;
            margin-bottom: 1.6rem;
            opacity: 0.45;
            filter: grayscale(1);
        }

        .message {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.65rem, 1.8vw, 0.78rem);
            font-weight: 400;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: #666;
            line-height: 2.2;
            max-width: 380px;
            margin: 0 auto;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            color: #2e2e2e;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">E<em>C</em>LIPSE</div>
        <div class="divider"></div>
        <div class="lock">&#128274;</div>
        <p class="message">You are not authorized to view the content of this website</p>
    </div>
    <div class="footer">&copy; 2026 Eclipse &mdash; Private Access Only</div>
</body>
</html>
