<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse — Models</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0c0c0c;
            --card-bg: #141414;
            --border: #242424;
            --gold: #c9a455;
            --gold-light: #e8c978;
            --text: #ffffff;
            --muted: #777;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: #0c0c0c;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #auth-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #1c1008 0%, #0c0c0c 65%);
        }

        .auth-box {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 380px;
            width: 100%;
            animation: fadeUp 0.8s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(2.8rem, 10vw, 4.5rem);
            font-weight: 300;
            letter-spacing: 0.5em;
            padding-right: 0.5em;
            color: #fff;
            text-transform: uppercase;
        }

        .auth-brand em { font-style: normal; color: var(--gold); }

        .auth-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 1.8rem auto;
        }

        .auth-subtitle {
            font-size: 0.62rem;
            letter-spacing: 0.4em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        #auth-form { display: flex; flex-direction: column; gap: 1rem; }

        #password-input {
            background: #181818;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            padding: 1rem 1.2rem;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        #password-input:focus { border-color: var(--gold); }
        #password-input::placeholder { color: #444; letter-spacing: 0.25em; }

        .auth-btn {
            background: var(--gold);
            color: #0c0c0c;
            border: none;
            border-radius: 2px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.35em;
            padding: 1rem 2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .auth-btn:hover { background: var(--gold-light); }
        .auth-btn:active { transform: scale(0.98); }

        .error-msg {
            color: #e05252;
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            display: none;
            margin-top: 0.25rem;
        }

        #gallery-content { display: none; min-height: 100vh; }

        .site-header {
            text-align: center;
            padding: 4rem 2rem 3rem;
            border-bottom: 1px solid var(--border);
        }

        .site-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.5em;
            padding-right: 0.5em;
            text-transform: uppercase;
        }

        .site-brand em { font-style: normal; color: var(--gold); }

        .site-tagline {
            font-size: 0.62rem;
            letter-spacing: 0.4em;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .header-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 1.5rem auto 0;
        }

        .models-section {
            padding: 3rem 2rem 5rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .model-card {
            position: relative;
            border-radius: 3px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            display: block;
            aspect-ratio: 3/4;
            transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }

        .model-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,164,85,0.15);
        }

        .model-card-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
            transition: transform 0.5s ease;
        }

        .model-card:hover .model-card-photo { transform: scale(1.05); }

        .model-card-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            padding: 2.5rem 1.4rem 1.4rem;
        }

        .model-card-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.7rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #fff;
            line-height: 1.1;
        }

        .model-card-price {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.28em;
            color: var(--gold);
            text-transform: uppercase;
            margin-top: 0.4rem;
        }

        .model-card-arrow {
            position: absolute;
            top: 1.2rem; right: 1.2rem;
            width: 32px; height: 32px;
            border: 1px solid rgba(201,164,85,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--gold);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .model-card:hover .model-card-arrow { opacity: 1; }

        .site-footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            color: #2e2e2e;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <div class="auth-brand">E<em>C</em>LIPSE</div>
            <div class="auth-divider"></div>
            <p class="auth-subtitle">Private Access Required</p>
            <form id="auth-form" autocomplete="off">
                <input type="password" id="password-input" placeholder="Enter Password" />
                <button type="submit" class="auth-btn">Enter</button>
                <p class="error-msg" id="error-msg">&#10005; &nbsp;Incorrect password. Please try again.</p>
            </form>
        </div>
    </div>

    <div id="gallery-content">
        <header class="site-header">
            <div class="site-brand">E<em>C</em>LIPSE</div>
            <div class="header-divider"></div>
            <p class="site-tagline">Our Models</p>
        </header>
        <section class="models-section">
            <div class="models-grid">

                <!-- Nia -->
                <a class="model-card" href="../models/nia/">
                    <img class="model-card-photo" src="../images/nia/1.jpeg" alt="Nia" loading="lazy">
                    <div class="model-card-overlay">
                        <div class="model-card-name">Nia</div>
                        <div class="model-card-price">From $700</div>
                    </div>
                    <div class="model-card-arrow">&#8599;</div>
                </a>
                <!-- Imani -->
                <a class="model-card" href="../models/imani/">
                    <img class="model-card-photo" src="../images/imani/1.jpeg" alt="Imani" loading="lazy">
                    <div class="model-card-overlay">
                        <div class="model-card-name">Imani</div>
                        <div class="model-card-price">From $1,400</div>
                    </div>
                    <div class="model-card-arrow">&#8599;</div>
                </a>
                <!-- Deshawn -->
                <a class="model-card" href="../models/deshawn/">
                    <img class="model-card-photo" src="../images/deshawn/1.jpeg" alt="Deshawn" loading="lazy">
                    <div class="model-card-overlay">
                        <div class="model-card-name">Deshawn</div>
                        <div class="model-card-price">From $1,200</div>
                    </div>
                    <div class="model-card-arrow">&#8599;</div>
                </a>
                <!-- MaskedAyana -->
                <a class="model-card" href="../models/maskedayana/">
                    <img class="model-card-photo" src="../images/maskedayana/1.jpeg" alt="MaskedAyana" loading="lazy">
                    <div class="model-card-overlay">
                        <div class="model-card-name">MaskedAyana</div>
                        <div class="model-card-price">From $2,200</div>
                    </div>
                    <div class="model-card-arrow">&#8599;</div>
                </a>
            </div>
        </section>
        <footer class="site-footer">&copy; 2026 Eclipse &mdash; Private Access Only</footer>
    </div>

    <script>
        const PASSWORD = 'eclipsecompanions';
        const overlay  = document.getElementById('auth-overlay');
        const content  = document.getElementById('gallery-content');
        const form     = document.getElementById('auth-form');
        const input    = document.getElementById('password-input');
        const errorMsg = document.getElementById('error-msg');

        function unlock() {
            sessionStorage.setItem('eclipse_auth', 'true');
            overlay.style.display = 'none';
            content.style.display = 'block';
        }

        if (sessionStorage.getItem('eclipse_auth') === 'true') { unlock(); }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value === PASSWORD) {
                unlock();
            } else {
                errorMsg.style.display = 'block';
                input.value = '';
                input.focus();
                input.style.borderColor = '#e05252';
                setTimeout(() => { input.style.borderColor = ''; }, 1500);
            }
        });
    </script>
</body>
</html>
